services:
  - type: web
    name: eventsync-ai-server
    runtime: node
    buildCommand: cd server && npm install
    startCommand: cd server && node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DB_PATH
        value: /var/data/eventsync.db
    disk:
      name: eventsync-db
      mountPath: /var/data
      sizeGB: 1
